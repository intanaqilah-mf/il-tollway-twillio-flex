steps:
  # 1️⃣ SAST Scan
  - name: returntocorp/semgrep
    id: Run-SAST-Scan
    entrypoint: semgrep
    args:
      - ci

  # 2️⃣ Build Docker Image
  - name: gcr.io/cloud-builders/docker
    id: Build
    args:
      - build
      - "--no-cache"
      - "-f"
      - Dockerfile
      - "-t"
      - us-central1-docker.pkg.dev/$PROJECT_ID/istha-repo/$_SERVICE_NAME:$COMMIT_SHA
      - .

  # 3️⃣ Push Image to Artifact Registry
  - name: gcr.io/cloud-builders/docker
    id: Push
    args:
      - push
      - us-central1-docker.pkg.dev/$PROJECT_ID/istha-repo/$_SERVICE_NAME:$COMMIT_SHA

  # 4️⃣ Deploy to Cloud Run
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: Deploy
    entrypoint: gcloud
    args:
      - run
      - services
      - update
      - $_SERVICE_NAME
      - "--platform=managed"
      - "--image=us-central1-docker.pkg.dev/$PROJECT_ID/istha-repo/$_SERVICE_NAME:$COMMIT_SHA"
      - "--region=$_DEPLOY_REGION"
      - "--port=8080"
      - "--quiet"

images:
  - us-central1-docker.pkg.dev/$PROJECT_ID/istha-repo/$_SERVICE_NAME:$COMMIT_SHA

options:
  substitutionOption: ALLOW_LOOSE
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _SERVICE_NAME: iframe-ui-service
  _ARTIFACT_REGISTRY_HOSTNAME: us-central1-docker.pkg.dev
  _DEPLOY_REGION: us-central1
  _LABELS: ''

tags:
  - gcp-cloud-build-deploy-cloud-run
  - gcp-cloud-build-deploy-cloud-run-managed
