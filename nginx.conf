server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json application/xml text/xml;
    gzip_min_length 1024;

    add_header X-Content-Type-Options "nosniff" always;

    # SAP UI5 requires CDN access for framework resources, fonts, and themes.
    # unsafe-inline: UI5 bootstrap injects inline scripts/styles.
    # unsafe-eval: UI5 module loader uses eval for legacy compatibility.
    add_header Content-Security-Policy "
        default-src 'self';
        script-src 'self' https://ui5.sap.com https://sapui5.hana.ondemand.com https://openui5.hana.ondemand.com 'unsafe-inline' 'unsafe-eval';
        style-src 'self' https://ui5.sap.com https://sapui5.hana.ondemand.com https://openui5.hana.ondemand.com 'unsafe-inline';
        font-src 'self' https://ui5.sap.com https://sapui5.hana.ondemand.com data:;
        img-src 'self' https://ui5.sap.com https://sapui5.hana.ondemand.com data: blob:;
        connect-src 'self';
        frame-ancestors 'self' https://*.rcvp.tollway.state.il.us https://*.getipass.com;
    " always;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
